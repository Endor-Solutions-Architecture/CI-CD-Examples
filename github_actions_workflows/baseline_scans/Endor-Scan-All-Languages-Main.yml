name: Endor Labs - SCA Scan on Main
on:
  workflow_dispatch
    
jobs:
  scan-repo:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:

        - name: Checkout Repository
          uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
          
        - name: Set up Python 3.11
          uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
          with:
            python-version: '3.11'
            cache: 'pip'
    
        - name: Install Python Dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Setup Java
          uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
          with:
            distribution: microsoft
            java-version: "21"

        - name: Compile Java Package
          run: mvn clean install

        - name: Setup Node
          uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
          with:
            node-version: 20
            cache: 'npm'
            cache-dependency-path: package-lock.json
          
        - name: Build npm Dependencies
          run: npm ci

        - name: Setup Go
          uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
          with:
            go-version: '1.22.4'
          
        - name: Go Build 
          run: go build
            
        - name: Endor Labs SCA Scan
          uses: endorlabs/github-action@802fa65ba7c140405ee52d1c806cfdb647f8f743 # v1.1.4
          with:
            namespace: "matt-demo"
            api: "https://api.endorlabs.com"
            pr: false
            enable_github_action_token: true
            scan_dependencies: true
            # scan_secrets: true <-- Uncomment to enable secrets scanning
            # scan_git_logs: true <-- Uncomment to scan git logs for committed secrets
            # scan_github_actions: true <-- Uncomment to scan GH Action Vulnerabilities
            # scan_tools: true <-- Uncomment to scan identified tools
            additional_args: "--as-default-branch" # Additional parameters can be passed with whitespace separation, for example: --github to enable RSPM
